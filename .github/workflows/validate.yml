name: validate-records

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # One run id correlates validate -> compile -> monitor in logs/runs.jsonl.
      ONCOMAP_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Validate records against schema + trust gate
        # `uv run` provisions an isolated env from pyproject.toml + uv.lock,
        # avoiding the runner's externally-managed system Python.
        run: uv run --locked python build/validate.py

      - name: Compile records into graph + tables + site payload
        # Smoke test that the compiler runs on the current records. Parquet is
        # skipped here (the build extra isn't installed); CSV/JSON are produced.
        run: uv run --locked python build/compile.py

      - name: Catalog health (offline SLIs)
        # Coverage/trust SLIs on every push; --warn-only so a health dip never
        # blocks a PR (the gating link-rot alert lives in the freshness sweep).
        run: uv run --locked python build/monitor.py --warn-only

      - name: Unit tests (offline logic)
        run: uv run --extra dev --locked python -m pytest -q

      - name: Upload run logs & health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-run
          path: |
            logs/runs.jsonl
            build/dist/health.json
          if-no-files-found: ignore

  web-tests:
    # Typecheck + Vitest for the React app. Independent of the Python job (the
    # tests mock the site.json payload, so no compile step is needed).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + component tests (Vitest)
        run: npm test
